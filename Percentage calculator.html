
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Percentage Calculator</title>
  <style>
    body {
      margin: 0;
      padding: 0;
      font-family: Arial, sans-serif;
      background: linear-gradient(90deg, #000000, #0a0a0f37, #111827);
      background-size: 400% 400%;
      animation: bgMove 18s ease infinite;
      height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      color: #e6e6e6;
    }

    .container {
      background: rgba(255, 255, 255, 0.073);
      padding: 35px;
      border-radius: 22px;
      box-shadow: 0 8px 35px rgba(0, 0, 0, 0.7);
      width: 360px;
      backdrop-filter: blur(12px);
      border: 1px solid rgba(255, 255, 255, 0.1);
    }

    h2 {
      text-align: center;
      margin-bottom: 25px;
      font-size: 32px;
      letter-spacing: 1px;
      font-weight: 700;
      color: #ffffff;
      text-shadow: 0 0 10px #000000;
    }

    label {
      margin-top: 12px;
      display: block;
      font-size: 16px;
      font-weight: bold;
      opacity: 0.95;
      color: #dcdcdc;
    }

    input {
      width: 100%;
      padding: 12px;
      margin-top: 6px;
      border-radius: 12px;
      border: none;
      font-size: 16px;
      outline: none;
      background: rgba(255, 255, 255, 0.15);
      color: #fff;
    }

    button {
      width: 100%;
      margin-top: 25px;
      padding: 14px;
      font-size: 18px;
      border: none;
      border-radius: 14px;
      background: linear-gradient(135deg, #3f5efb, #2c3e50);
      color: #fff;
      cursor: pointer;
      font-weight: bold;
      transition: 0.25s;
    }

    button:hover {
      transform: translateY(-2px);
      background: linear-gradient(135deg, #2c3e50, #4057d9);
    }

    .result {
      margin-top: 22px;
      font-size: 24px;
      text-align: center;
      font-weight: 700;
      letter-spacing: 0.5px;
      color: #8ab4ff;
      opacity: 0;
      transition: opacity 0.6s ease, transform 0.6s ease;
      transform: translateY(10px);
    }

    .result.show {
      opacity: 1;
      transform: translateY(0);
    }

    input:focus {
      box-shadow: 0 0 8px #3f5efb;
      background: rgba(255, 255, 255, 0.22);
    }

    button:active {
      transform: scale(0.97);
      box-shadow: 0 0 12px #3f5efb;
    }

    .container:hover {
      transform: translateY(-6px);
      transition: 0.4s ease;
      box-shadow: 0 10px 45px rgba(0,0,0,0.8);
    }
  </style>
</head>
<body>
  <div class="container">
    <h2>Percentage Calculator</h2>

    <label>Marks obtained</label>
    <input type="number" id="value" placeholder="Enter marks obtained" />

    <label>Total Marks</label>
    <input type="number" id="total" placeholder="Enter total marks" />

    <button onclick="calculatePercentage()">Calculate</button>

    <div class="result" id="result"></div>
  </div>

  <script>
    function calculatePercentage() {
      const value = parseFloat(document.getElementById('value').value);
      const total = parseFloat(document.getElementById('total').value);
      const resultBox = document.getElementById('result');

      if (isNaN(value) || isNaN(total) || total === 0) {
        resultBox.classList.add('show');
      resultBox.style.color = 'red';
      resultBox.textContent = 'Please enter valid numbers!';
        return;
      }

      const percentage = (value / total) * 100;
      resultBox.style.color = '#00ff44';
      resultBox.classList.add('show');
      resultBox.textContent = `Result: ${percentage.toFixed(2)}%`;
    }
  </script>
</body>
</html>
